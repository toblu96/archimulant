services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: archimulant:latest
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      NUXT_SCENARIOS_DIR: ${NUXT_SCENARIOS_DIR:-server/data/scenarios}
      NUXT_AUTH_DATABASE_FILE_PATH: ${NUXT_AUTH_DATABASE_FILE_PATH:-.data/auth.db}
      NUXT_AUTH_AUTO_MIGRATE: ${NUXT_AUTH_AUTO_MIGRATE:-true}
      NUXT_AUTH_GOOGLE_CLIENT_ID: ${NUXT_AUTH_GOOGLE_CLIENT_ID:-}
      NUXT_AUTH_GOOGLE_CLIENT_SECRET: ${NUXT_AUTH_GOOGLE_CLIENT_SECRET:-}
      NUXT_AUTH_GITHUB_CLIENT_ID: ${NUXT_AUTH_GITHUB_CLIENT_ID:-}
      NUXT_AUTH_GITHUB_CLIENT_SECRET: ${NUXT_AUTH_GITHUB_CLIENT_SECRET:-}
    volumes:
      - app-data:/app/.data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
    driver: local
